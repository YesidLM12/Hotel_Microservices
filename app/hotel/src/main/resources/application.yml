server:
  port: 8080

spring:
  application:
    name: hotel
  profiles:
    active: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

logging:
  level:
    root: INFO
    com:
      hotel: DEBUG
    org:
      hibernate: WARN
      springframework: WARN
    file:
      path: logs/hotel.log
      pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} [%level] [%thread] %logger{36} - %msg%n"
        file: "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"
    logback:
      rollingpolicy:
        max-file-size: 10MB
        max-history: 30
